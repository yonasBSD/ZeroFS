name: Cross Compile

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-webui:
    name: Build WebUI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Install VM image build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools squashfs-tools

      - name: Build WebUI
        run: make webui

      - name: Upload WebUI dist
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist/
          retention-days: 1

  cross-compile:
    name: Cross compile for ${{ matrix.target }}
    needs: build-webui
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            os: ubuntu-latest
            platform: linux
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            os: ubuntu-latest
            platform: linux
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7
            os: ubuntu-latest
            platform: linux
          - target: i686-unknown-linux-gnu
            arch: i686
            os: ubuntu-latest
            platform: linux
          - target: powerpc64le-unknown-linux-gnu
            arch: ppc64le
            os: ubuntu-latest
            platform: linux
          - target: s390x-unknown-linux-gnu
            arch: s390x
            os: ubuntu-latest
            platform: linux
          - target: riscv64gc-unknown-linux-gnu
            arch: riscv64
            os: ubuntu-latest
            platform: linux
          - target: x86_64-apple-darwin
            arch: x86_64
            os: macos-latest
            platform: darwin
          - target: aarch64-apple-darwin
            arch: aarch64
            os: macos-latest
            platform: darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download WebUI dist
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist/

      - name: Install cross (Linux only)
        if: matrix.platform == 'linux'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Configure jemalloc page size for aarch64
        if: startsWith(matrix.target, 'aarch64-') && matrix.platform == 'darwin'
        run: echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

      - name: Build with cross (Linux)
        if: matrix.platform == 'linux'
        working-directory: zerofs
        env:
          CROSS_CONTAINER_OPTS: "--volume ${{ github.workspace }}/webui/dist:${{ github.workspace }}/webui/dist:ro"
        run: |
          cross build --profile ci --features webui --target ${{ matrix.target }}

      - name: Build with cargo (macOS)
        if: matrix.platform == 'darwin'
        working-directory: zerofs
        run: |
          cargo build --profile ci --features webui --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          mkdir -p artifacts
          cp zerofs/target/${{ matrix.target }}/ci/zerofs artifacts/zerofs-${{ matrix.platform }}-${{ matrix.arch }}
          chmod +x artifacts/zerofs-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zerofs-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/zerofs-${{ matrix.platform }}-${{ matrix.arch }}
          retention-days: 7

  create-release-artifacts:
    name: Create combined release artifacts
    needs: cross-compile
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -la artifacts/
          ls -la artifacts/*/

      - name: Create tarball
        run: |
          mkdir -p release
          for arch_dir in artifacts/*/; do
            if [ -d "$arch_dir" ]; then
              cp "$arch_dir"* release/
            fi
          done
          cd release
          tar czf ../zerofs-multiplatform.tar.gz zerofs-*
          cd ..
          sha256sum zerofs-multiplatform.tar.gz > zerofs-multiplatform.tar.gz.sha256

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zerofs-multiplatform
          path: |
            zerofs-multiplatform.tar.gz
            zerofs-multiplatform.tar.gz.sha256
          retention-days: 30

      - name: Display SHA256 checksums
        run: |
          echo "SHA256 checksums for individual binaries:"
          cd release
          sha256sum zerofs-*